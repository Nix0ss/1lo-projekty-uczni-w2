<script>
const form = document.getElementById('projektForm');
const lista = document.getElementById('listaProjektow');

// funkcja do wyświetlania projektów z localStorage
function wyswietlProjekty() {
  lista.innerHTML = '';
  const projekty = JSON.parse(localStorage.getItem('projekty')) || [];
  projekty.forEach(p => {
    const li = document.createElement('li');
    li.innerHTML = `<strong>${p.nazwa}</strong> (${p.imie}) - ${p.opis} - <a href="${p.url}" download="${p.plikName}">Pobierz plik</a>`;
    lista.appendChild(li);
  });
}

// przy ładowaniu strony
wyswietlProjekty();

// obsługa formularza
form.addEventListener('submit', function(e){
  e.preventDefault();
  
  const imie = document.getElementById('imie').value;
  const nazwa = document.getElementById('nazwa').value;
  const plikInput = document.getElementById('plik');
  const opis = document.getElementById('opis').value;
  
  if(!plikInput.files[0]) { alert("Wybierz plik!"); return; }
  
  const plik = plikInput.files[0];
  const url = URL.createObjectURL(plik);

  const projekty = JSON.parse(localStorage.getItem('projekty')) || [];
  projekty.push({imie, nazwa, opis, url, plikName: plik.name});
  localStorage.setItem('projekty', JSON.stringify(projekty));
  
  // odśwież listę
  wyswietlProjekty();
  
  form.reset();
});
</script>
